services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stackly}
      POSTGRES_USER: ${POSTGRES_USER:-stackly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stackly}
    ports:
      - 5432:5432
    volumes:
      - db:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-stackly} -d $${POSTGRES_DB:-stackly}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
    db:
