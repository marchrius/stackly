name: Next CI

on:
  workflow_dispatch:
  push:
    paths:
      - "next/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "next/**"
      - ".github/workflows/ci.yml"

jobs:
  validate:
    name: Validate Next workspace
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: next

    env:
      DATABASE_URL: postgresql://stackly:stackly@localhost:5432/stackly
      NEXTAUTH_SECRET: ci-secret
      NEXTAUTH_URL: http://localhost:3000
      UPLOAD_DIR: ./public/uploads
      OIDC_ENABLED: "false"

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: stackly
          POSTGRES_USER: stackly
          POSTGRES_PASSWORD: stackly
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stackly -d stackly"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Validate translations
        run: npm run i18n:validate

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
